<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{layout/plantilla :: head}"></head>
<body>
<div th:replace="~{layout/plantilla :: shell(~{::content})}">
    <div th:fragment="content">

        <!-- Alertas flash -->
        <div th:if="${mensajeExito}"
             class="alert alert-success alert-dismissible fade show mb-4" role="alert">
            <i class="fa-solid fa-circle-check me-2"></i>
            <span th:text="${mensajeExito}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Encabezado -->
        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
            <div>
                <h2 class="fw-bold mb-1">
                    <i class="fa-solid fa-newspaper text-primary me-2"></i>Noticias y Anuncios
                </h2>
                <p class="text-muted mb-0 small">Comunicados y novedades de la institución</p>
            </div>
            <!-- Botón solo visible para admin -->
            <a th:href="@{/noticias}"
               sec:authorize="hasRole('ADMINISTRADOR')"
               class="btn btn-outline-primary btn-sm">
                <i class="fa-solid fa-gear me-1"></i> Gestionar
            </a>
        </div>

        <!-- Sin noticias -->
        <div th:if="${#lists.isEmpty(noticias)}"
             class="card border-0 shadow-sm">
            <div class="card-body text-center py-5 text-muted">
                <i class="fa-regular fa-newspaper fa-3x mb-3 d-block"></i>
                <h5>Sin noticias por el momento</h5>
                <p class="mb-0 small">Volvé a revisar pronto para ver novedades institucionales.</p>
            </div>
        </div>

        <!-- Feed de noticias -->
        <div th:unless="${#lists.isEmpty(noticias)}" class="row g-4">
            <div class="col-12" th:each="noticia, iter : ${noticias}">
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4">

                        <!-- Tipo + fecha -->
                        <div class="d-flex align-items-center gap-2 mb-2">
                            <!-- Badge de tipo: NOTICIA en azul, ANUNCIO en naranja -->
                            <span th:if="${noticia.tipoEvento == 'NOTICIA'}"
                                  class="badge bg-primary-subtle text-primary px-2 py-1">
                                <i class="fa-solid fa-newspaper me-1"></i>Noticia
                            </span>
                            <span th:if="${noticia.tipoEvento == 'ANUNCIO'}"
                                  class="badge bg-warning-subtle text-warning px-2 py-1">
                                <i class="fa-solid fa-bullhorn me-1"></i>Anuncio
                            </span>
                            <!-- Indicador "NUEVO" para noticias de los últimos 3 días -->
                            <span th:if="${noticia.fechaInicio != null && noticia.fechaInicio.isAfter(#temporals.createNow().toLocalDate().minusDays(3))}"
                                  class="badge bg-danger-subtle text-danger px-2 py-1">
                                <i class="fa-solid fa-circle me-1" style="font-size:8px;"></i>Nuevo
                            </span>
                            <span class="text-muted small ms-auto">
                                <i class="fa-regular fa-calendar me-1"></i>
                                <span th:text="${#temporals.format(noticia.fechaInicio, 'dd/MM/yyyy')}"></span>
                            </span>
                        </div>

                        <!-- Título -->
                        <h5 class="fw-bold mb-2" th:text="${noticia.titulo}"></h5>

                        <!-- Descripción -->
                        <p class="text-muted mb-0" th:text="${noticia.descripcion}"></p>

                        <!-- Fecha de vencimiento si existe -->
                        <div th:if="${noticia.fechaFin != null}"
                             class="mt-3 small text-muted">
                            <i class="fa-regular fa-clock me-1"></i>
                            Vigente hasta:
                            <span th:text="${#temporals.format(noticia.fechaFin, 'dd/MM/yyyy')}"></span>
                        </div>

                    </div>
                </div>
            </div>
        </div>

    </div>
</div>
<footer th:replace="~{layout/plantilla :: footer}"></footer>
</body>
</html>
