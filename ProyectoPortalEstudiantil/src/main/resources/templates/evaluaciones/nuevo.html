<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

    <th:block th:fragment="head">
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>Portal Estudiantil - Nueva Evaluación</title>
        <link rel="icon" type="image/x-icon" th:href="@{/img/Escuela_Neftali.png}">
        <link rel="stylesheet"
              href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
        <link rel="stylesheet" th:href="@{/css/layout.css}">
        <link rel="stylesheet" th:href="@{/css/evaluaciones.css}">
        <link rel="stylesheet"
              href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    </th:block>

    <body>

        <div th:replace="~{layout/plantilla :: shell(~{::section#formulario})}">

            <section id="formulario">

                <div class="page-header">
                    <h4 class="page-title">Nueva Evaluación</h4>
                    <a th:href="@{/evaluaciones}" class="btn btn-light btn-sm btn-back">
                        <i class="fa-solid fa-arrow-left"></i>
                        Volver
                    </a>
                </div>

                <div class="card form-card">
                    <div class="card-body">

                        <form id="formNuevaEvaluacion"
                              th:object="${evaluacion}"
                              th:action="@{/evaluaciones/guardar}"
                              method="post">

                            <div class="row g-3">

                                <div class="col-md-6">
                                    <label class="form-label">Tipo de evaluación</label>
                                    <input type="text"
                                           class="form-control form-control-custom"
                                           th:field="*{tipo}"
                                           placeholder="Ej: Examen Parcial"
                                           required>
                                </div>

                                <div class="col-md-3">
                                    <label class="form-label">Porcentaje</label>
                                    <div class="input-group">
                                        <input type="number"
                                               step="0.01"
                                               min="0"
                                               max="100"
                                               class="form-control form-control-custom"
                                               th:field="*{porcentaje}"
                                               placeholder="0.00"
                                               required>
                                        <span class="input-group-text">%</span>
                                    </div>
                                </div>

                                <div class="col-md-3">
                                    <label class="form-label">Periodo</label>
                                    <select class="form-select form-control-custom"
                                            th:field="*{periodo}"
                                            required>
                                        <option value="">Seleccione</option>
                                        <option th:each="p : ${periodos}"
                                                th:value="${p.idPeriodo}"
                                                th:text="${p.nombre}">
                                        </option>
                                    </select>
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label">Sección - Materia</label>
                                    <select class="form-select form-control-custom"
                                            th:field="*{seccionMateria}"
                                            required>
                                        <option value="">Seleccione</option>
                                        <option th:each="s : ${secciones}"
                                                th:value="${s.idSeccionMateria}"
                                                th:text="${s.nombreCompleto}">
                                        </option>
                                    </select>
                                </div>

                            </div>

                            <div class="form-actions mt-4">
                                <button type="submit" class="btn btn-primary btn-save">
                                    <i class="fa-solid fa-save me-1"></i>
                                    Guardar
                                </button>
                                <a th:href="@{/evaluaciones}"
                                   class="btn btn-outline-secondary btn-cancel">
                                    Cancelar
                                </a>
                            </div>

                        </form>

                    </div>
                </div>

            </section>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script th:src="@{/js/evaluaciones.js}"></script>

    </body>
</html>
