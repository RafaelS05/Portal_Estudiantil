<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Portal Estudiantil - Evaluaciones</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/evaluaciones.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body onload="var modal = new bootstrap.Modal(document.getElementById('evaluacionModal')); modal.show();">

    <!-- Modal -->
    <div class="modal fade" id="evaluacionModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
                
                <div class="modal-header">
                    <h5 class="modal-title" 
                        th:text="${evaluacion.idEvaluacion != null ? 'Editar Evaluación' : 'Nueva Evaluación'}">
                    </h5>
                    <a th:href="@{/evaluaciones}" class="btn-close" aria-label="Cerrar"></a>
                </div>
                
                <!-- Formulario para NUEVA evaluación -->
                <form th:if="${evaluacion.idEvaluacion == null}" 
                      th:action="@{/evaluaciones/guardar}" 
                      th:object="${evaluacion}" method="post">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Tipo de Evaluación</label>
                            <input type="text" class="form-control" th:field="*{tipo}" placeholder="Ej: Examen Parcial">
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Porcentaje</label>
                            <input type="number" step="0.01" class="form-control" th:field="*{porcentaje}" placeholder="Ej: 30">
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Sección</label>
                            <select class="form-select" th:field="*{seccionMateria}">
                                <option th:each="s : ${secciones}" 
                                        th:value="${s.idSeccionMateria}" 
                                        th:text="${s.nombreCompleto}"></option>
                            </select>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Periodo</label>
                            <select class="form-select" th:field="*{periodo}">
                                <option th:each="p : ${periodos}" 
                                        th:value="${p.idPeriodo}" 
                                        th:text="${p.nombre}"></option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="modal-footer">
                        <a th:href="@{/evaluaciones}" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-primary-custom">Guardar</button>
                    </div>
                </form>
                
                <!-- Formulario para EDITAR evaluación -->
                <form th:if="${evaluacion.idEvaluacion != null}" 
                      th:action="@{/evaluaciones/actualizar/{id}(id=${evaluacion.idEvaluacion})}" 
                      th:object="${evaluacion}" method="post">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Tipo de Evaluación</label>
                            <input type="text" class="form-control" th:field="*{tipo}">
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Porcentaje</label>
                            <input type="number" step="0.01" class="form-control" th:field="*{porcentaje}">
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Sección</label>
                            <select class="form-select" th:field="*{seccionMateria}">
                                <option th:each="s : ${secciones}" 
                                        th:value="${s.idSeccionMateria}" 
                                        th:text="${s.nombreCompleto}"></option>
                            </select>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Periodo</label>
                            <select class="form-select" th:field="*{periodo}">
                                <option th:each="p : ${periodos}" 
                                        th:value="${p.idPeriodo}" 
                                        th:text="${p.nombre}"></option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="modal-footer">
                        <a th:href="@{/evaluaciones}" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-primary-custom">Actualizar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
