<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="layout/plantilla :: head">
</head>

<body>
    <div th:replace="layout/plantilla :: shell(~{:: #contenido-usuarios})">
        
        <div id="contenido-usuarios">
            <div th:replace="layout/plantilla :: hero"></div>
            
        
            <div class="mt-4">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">Gestión de Usuarios</h5>
                        <button type="button" class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#crearUsuarioModal">
                            <i class="fas fa-plus me-1"></i> Nuevo Usuario
                        </button>
                    </div>
                    
                    <div class="card-body">
                        <form th:action="@{/usuarios/buscar}" method="get" class="mb-4">
                            <div class="input-group">
                                <input type="text" name="busqueda" class="form-control" 
                                       placeholder="Buscar usuario por nombre o apellido..." 
                                       th:value="${busqueda != null ? busqueda : ''}">
                                <button type="submit" class="btn btn-outline-primary">
                                    <i class="fas fa-search"></i> Buscar
                                </button>
                            </div>
                        </form>
                  
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead>
                                    <tr>
                                        <th>Nombre</th>
                                        <th>Apellidos</th>
                                        <th>Tipo de Usuario</th>
                                        <th>Estado</th>
                                        <th class="text-end">Acciones</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="usuario : ${usuarios}">
                                        <td th:text="${usuario.nombre}"></td>
                                        <td>
                                            <span th:text="${usuario.primerApellido}"></span>
                                            <span th:if="${usuario.segundoApellido != null and not usuario.segundoApellido.isEmpty()}" 
                                                  th:text="' ' + ${usuario.segundoApellido}"></span>
                                        </td>
                                        <td>
                                            <span class="badge" 
                                                  th:classappend="${usuario.tipoUsuario.nombre == 'Administrador'} ? 'bg-danger' : 
                                                                  ${usuario.tipoUsuario.nombre == 'Docente'} ? 'bg-warning' : 'bg-info'"
                                                  th:text="${usuario.tipoUsuario.nombre}">
                                            </span>
                                        </td>
                                        <td>
                                            <span class="badge" 
                                                  th:classappend="${usuario.estado.descripcion == 'Activo'} ? 'bg-success' : 'bg-secondary'"
                                                  th:text="${usuario.estado.descripcion}">
                                            </span>
                                        </td>
                                        <td class="text-end">
                                            <a th:href="@{/usuarios/cambiar-estado/{idUsuario}/{idEstado}(idUsuario=${usuario.idUsuario}, idEstado=2)}"
                                               class="btn btn-outline-warning btn-sm"
                                               th:if="${usuario.estado.descripcion == 'Activo'}"
                                               title="Desactivar usuario">
                                                <i class="fas fa-user-slash"></i>
                                            </a>
                                           
                                            <a th:href="@{/usuarios/cambiar-estado/{idUsuario}/{idEstado}(idUsuario=${usuario.idUsuario}, idEstado=1)}"
                                               class="btn btn-outline-success btn-sm"
                                               th:if="${usuario.estado.descripcion == 'Inactivo'}"
                                               title="Activar usuario">
                                                <i class="fas fa-user-check"></i>
                                            </a>
                                            
                                            <a th:href="@{/usuarios/eliminar/{id}(id=${usuario.idUsuario})}"
                                               class="btn btn-outline-danger btn-sm"
                                               onclick="return confirm('¿Está seguro de eliminar este usuario?')"
                                               title="Eliminar usuario">
                                                <i class="fas fa-trash"></i>
                                            </a>
                                        </td>
                                    </tr>
                                    <tr th:if="${usuarios.isEmpty()}">
                                        <td colspan="5" class="text-center text-muted py-4">
                                            No se encontraron usuarios.
                                            <span th:if="${busqueda != null}">
                                                Intenta con otra búsqueda.
                                            </span>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                        
                        <div class="mt-3 text-muted">
                            <small th:text="'Mostrando ' + ${usuarios.size()} + ' usuarios'"></small>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal fade" id="crearUsuarioModal" tabindex="-1" aria-labelledby="crearUsuarioModalLabel" aria-hidden="true">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <form th:action="@{/usuarios/crear}" method="post">
                            <div class="modal-header">
                                <h5 class="modal-title" id="crearUsuarioModalLabel">Crear Nuevo Usuario</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                            </div>
                            <div class="modal-body">
                                <!-- Nombre -->
                                <div class="mb-3">
                                    <label for="nombre" class="form-label">Nombre *</label>
                                    <input type="text" class="form-control" id="nombre" name="nombre" required>
                                </div>
                                
                                <!-- Primer Apellido -->
                                <div class="mb-3">
                                    <label for="primerApellido" class="form-label">Primer Apellido *</label>
                                    <input type="text" class="form-control" id="primerApellido" name="primerApellido" required>
                                </div>
                                
                                <!-- Segundo Apellido -->
                                <div class="mb-3">
                                    <label for="segundoApellido" class="form-label">Segundo Apellido</label>
                                    <input type="text" class="form-control" id="segundoApellido" name="segundoApellido">
                                </div>
                                
                                <!-- Tipo de Usuario -->
                                <div class="mb-3">
                                    <label for="idTipoUsuario" class="form-label">Tipo de Usuario *</label>
                                    <select class="form-select" id="idTipoUsuario" name="idTipoUsuario" required>
                                        <option value="">Seleccionar tipo...</option>
                                        <option th:each="tipo : ${tiposUsuario}" 
                                                th:value="${tipo.idTipoUsuario}"
                                                th:text="${tipo.nombre}">
                                        </option>
                                    </select>
                                </div>
                                
                                <!-- Estado -->
                                <div class="mb-3">
                                    <label for="idEstado" class="form-label">Estado *</label>
                                    <select class="form-select" id="idEstado" name="idEstado" required>
                                        <option value="">Seleccionar estado...</option>
                                        <option th:each="estado : ${estados}" 
                                                th:value="${estado.idEstado}"
                                                th:text="${estado.descripcion}">
                                        </option>
                                    </select>
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                                <button type="submit" class="btn btn-primary">Crear Usuario</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Scripts simples -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('success')) {
                alert('Operación realizada con éxito');
            }
        });
    </script>
</body>
</html>
