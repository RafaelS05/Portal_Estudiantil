<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

    <head th:replace="~{layout/plantilla :: head}"></head>

    <body>
        <div th:replace="~{layout/plantilla :: shell(~{::content})}">
            <div th:fragment="content">

                <!-- ENCABEZADO -->
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div>
                        <h2 class="fw-bold mb-0" th:text="${titulo}">Nuevo Usuario</h2>
                        <p class="text-muted mb-0"
                           th:text="${titulo == 'Nuevo Usuario' ? 'Completa los datos para crear un nuevo usuario' : 'Modifica la información del usuario'}">
                        </p>
                    </div>

                    <a class="btn btn-outline-secondary" th:href="@{/usuarios}">
                        <i class="fa-solid fa-arrow-left me-1"></i> Volver
                    </a>
                </div>

                <!-- MENSAJES -->
                <div th:if="${mensaje}" class="alert alert-dismissible fade show mb-4"
                     th:classappend="${' alert-' + (tipoMensaje != null ? tipoMensaje : 'info')}"
                     role="alert">
                    [[${mensaje}]]
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <div class="card">
                    <div class="card-body">

                        <!-- FORM -->
                        <form th:action="@{${accion}}" method="post" th:object="${usuario}" class="row g-3">

                            <!-- INFORMACIÓN PERSONAL -->
                            <div class="col-12">
                                <h5><i class="fa-solid fa-user me-2"></i>Información Personal</h5>
                            </div>

                            <div class="col-md-4">
                                <label class="form-label">Nombre <span class="text-danger">*</span></label>
                                <input class="form-control"
                                       type="text"
                                       th:field="*{nombre}"
                                       required maxlength="50"
                                       pattern="[A-Za-zÁÉÍÓÚáéíóúÑñ ]+"
                                       placeholder="Ej: Juan">
                            </div>

                            <div class="col-md-4">
                                <label class="form-label">Primer Apellido <span class="text-danger">*</span></label>
                                <input class="form-control"
                                       type="text"
                                       th:field="*{primerApellido}"
                                       required maxlength="50"
                                       pattern="[A-Za-zÁÉÍÓÚáéíóúÑñ ]+"
                                       placeholder="Ej: Pérez">
                            </div>

                            <div class="col-md-4">
                                <label class="form-label">Segundo Apellido</label>
                                <input class="form-control"
                                       type="text"
                                       th:field="*{segundoApellido}"
                                       maxlength="50"
                                       pattern="[A-Za-zÁÉÍÓÚáéíóúÑñ ]*"
                                       placeholder="Opcional">
                            </div>

                            <!-- CONTACTO -->
                            <div class="col-12 mt-4"><hr><h5><i class="fa-solid fa-address-book me-2"></i>Contacto</h5></div>

                            <div class="col-md-6">
                                <label class="form-label">Teléfono <span class="text-danger">*</span></label>
                                <input class="form-control"
                                       type="tel"
                                       name="telefonoNumero"
                                       th:value="${telefonoNumero}"
                                       required
                                       pattern="[0-9]{4}-?[0-9]{4}"
                                       maxlength="9"
                                       placeholder="8888-9999">
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Correo (login) <span class="text-danger">*</span></label>
                                <input class="form-control"
                                       type="email"
                                       name="correoLogin"
                                       th:value="${correoLogin}"
                                       required maxlength="100"
                                       placeholder="usuario@correo.com">
                            </div>

                            <!-- CONFIGURACIÓN -->
                            <div class="col-12 mt-4"><hr><h5><i class="fa-solid fa-user-tag me-2"></i>Configuración</h5></div>

                            <div class="col-md-6">
                                <label class="form-label">Tipo Usuario <span class="text-danger">*</span></label>
                                <select th:field="*{idTipoUsuarioFk}" class="form-select" required>
                                    <option value="" disabled selected>Seleccionar...</option>
                                    <option th:each="tipo : ${tiposUsuario}"
                                            th:value="${tipo.idTipoUsuario}"
                                            th:text="${tipo.nombre}">
                                    </option>
                                </select>
                            </div>

                            <div class="col-md-6" th:if="${titulo == 'Nuevo Usuario'}">
                                <label class="form-label">Estado <span class="text-danger">*</span></label>
                                <select th:field="*{idEstadoFk}" class="form-select" required>
                                    <option value="" disabled selected>Seleccionar...</option>
                                    <option value="1">Activo</option>
                                    <option value="2">Inactivo</option>
                                </select>
                            </div>

                            <!-- UBICACIÓN -->
                            <div class="col-12 mt-4"><hr><h5><i class="fa-solid fa-location-dot me-2"></i>Ubicación</h5></div>

                            <div class="col-md-4">
                                <label class="form-label">Provincia <span class="text-danger">*</span></label>
                                <select name="idProvincia" id="provinciaSelect" class="form-select" required>
                                    <option value="">Seleccione</option>
                                    <option th:each="prov : ${provincias}"
                                            th:value="${prov.idProvincia}"
                                            th:text="${prov.nombre}">
                                    </option>
                                </select>
                            </div>

                            <div class="col-md-4">
                                <label class="form-label">Cantón <span class="text-danger">*</span></label>
                                <select name="idCanton" id="cantonSelect" class="form-select" required>
                                    <option value="">Seleccione</option>
                                </select>
                            </div>

                            <div class="col-md-4">
                                <label class="form-label">Distrito <span class="text-danger">*</span></label>
                                <select name="idDistrito" id="distritoSelect" class="form-select" required>
                                    <option value="">Seleccione</option>
                                </select>
                            </div>

                            <div class="col-12">
                                <label class="form-label">Otras señas</label>
                                <input type="text"
                                       name="otrasSenas"
                                       class="form-control"
                                       maxlength="150"
                                       placeholder="Ej: 100m norte del parque">
                            </div>

                            <!-- BOTONES -->
                            <div class="col-12 d-flex justify-content-between pt-3 border-top mt-4">
                                <a class="btn btn-outline-secondary" th:href="@{/usuarios}">Cancelar</a>
                                <button class="btn btn-primary" type="submit">Guardar</button>
                            </div>

                        </form>

                    </div>
                </div>

            </div>
        </div>

        <footer th:replace="~{layout/plantilla :: footer}"></footer>

        <!-- SCRIPT -->
        <script>
            document.addEventListener('DOMContentLoaded', function () {

                const provinciaSelect = document.getElementById('provinciaSelect');
                const cantonSelect = document.getElementById('cantonSelect');
                const distritoSelect = document.getElementById('distritoSelect');

                provinciaSelect.addEventListener('change', function () {
                    fetch('/usuarios/cantones?idProvincia=' + this.value)
                            .then(r => r.json())
                            .then(data => {
                                cantonSelect.innerHTML = '<option value="">Seleccione</option>';
                                data.forEach(c => {
                                    cantonSelect.innerHTML += `<option value="${c.idCanton}">${c.nombre}</option>`;
                                });
                            });
                });

                cantonSelect.addEventListener('change', function () {
                    fetch('/usuarios/distritos?idCanton=' + this.value)
                            .then(r => r.json())
                            .then(data => {
                                distritoSelect.innerHTML = '<option value="">Seleccione</option>';
                                data.forEach(d => {
                                    distritoSelect.innerHTML += `<option value="${d.idDistrito}">${d.nombre}</option>`;
                                });
                            });
                });

            });
        </script>

    </body>
</html>
