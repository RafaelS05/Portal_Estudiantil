<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{layout/plantilla :: head}"></head>
    <body>
        <div th:replace="~{layout/plantilla :: shell(~{::content})}">
            <div th:fragment="content">

                <!-- Cabecera -->
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <h4 class="fw-bold mb-0">
                            <i class="fa-solid fa-calendar-days text-primary me-2"></i>
                            Horario por Sección
                        </h4>
                        <p class="text-muted small mb-0" th:if="${esEncargado}">
                            Consulta el horario de la sección de tu estudiante.
                        </p>
                    </div>
                </div>

                <!-- Encargado sin estudiantes ligados -->
                <div th:if="${esEncargado and #lists.isEmpty(opciones)}"
                     class="card border-0 shadow-sm">
                    <div class="card-body text-center py-5 text-muted">
                        <i class="fa-solid fa-user-slash fa-2x mb-3 d-block opacity-25"></i>
                        No tiene estudiantes asignados en el sistema.
                    </div>
                </div>

                <!-- Sin secciones (admin) -->
                <div th:if="${not esEncargado and #lists.isEmpty(opciones)}"
                     class="card border-0 shadow-sm">
                    <div class="card-body text-center py-5 text-muted">
                        <i class="fa-solid fa-layer-group fa-2x mb-3 d-block opacity-25"></i>
                        No hay secciones registradas.
                    </div>
                </div>

                <div th:if="${not #lists.isEmpty(opciones)}">

                    <!-- Selector de sección -->
                    <div class="card border-0 shadow-sm mb-4">
                        <div class="card-body py-3">
                            <form th:action="@{/horarios}" method="get"
                                  class="row g-2 align-items-end">
                                <div class="col-12 col-md-6">
                                    <label class="form-label small fw-semibold mb-1"
                                           th:text="${esEncargado} ? 'Estudiante / Sección' : 'Sección'">
                                        Sección
                                    </label>
                                    <select name="idSeccion" class="form-select form-select-sm"
                                            onchange="this.form.submit()">
                                        <option th:each="op : ${opciones}"
                                                th:value="${op.idSeccion}"
                                                th:text="${op.etiqueta}"
                                                th:selected="${op.idSeccion == idSeccionSel}">
                                        </option>
                                    </select>
                                </div>
                            </form>
                        </div>
                    </div>

                    <!-- Cabecera de la sección seleccionada -->
                    <div th:if="${seccionSelLabel != null}" class="mb-3">
                        <span class="badge bg-primary bg-opacity-10 text-primary fs-6"
                              th:text="${seccionSelLabel}">Sección</span>
                    </div>

                    <!-- Sin bloques en el horario -->
                    <div th:if="${#lists.isEmpty(dias)}" class="card border-0 shadow-sm">
                        <div class="card-body text-center py-5 text-muted">
                            <i class="fa-regular fa-calendar fa-2x mb-3 d-block opacity-25"></i>
                            Esta sección no tiene horario registrado.
                        </div>
                    </div>

                    <!-- Horario semanal: una columna por día -->
                    <div th:if="${not #lists.isEmpty(dias)}" class="row g-3">
                        <div th:each="d : ${dias}" class="col-12 col-sm-6 col-lg">
                            <div class="card border-0 shadow-sm h-100">
                                <div class="card-header bg-white border-bottom py-3 text-center">
                                    <span class="fw-semibold" th:text="${d.nombreDia}">Día</span>
                                </div>
                                <div class="card-body p-2">
                                    <div th:each="b : ${d.bloques}"
                                         class="border rounded-3 p-2 mb-2 bg-light">
                                        <div class="small fw-bold text-primary mb-1">
                                            <i class="fa-regular fa-clock me-1"></i>
                                            <span th:text="${b.horaInicio != null and #strings.length(b.horaInicio) >= 5
                                                  ? #strings.substring(b.horaInicio,0,5) : b.horaInicio}">07:00</span>
                                            –
                                            <span th:text="${b.horaFin != null and #strings.length(b.horaFin) >= 5
                                                  ? #strings.substring(b.horaFin,0,5) : b.horaFin}">08:00</span>
                                        </div>
                                        <div class="fw-semibold small" th:text="${b.nombreMateria}">Materia</div>
                                        <div class="text-muted" style="font-size:11px;">
                                            <i class="fa-solid fa-chalkboard-user me-1"></i>
                                            <span th:text="${b.nombreDocente}">Docente</span>
                                        </div>
                                        <div class="text-muted" style="font-size:11px;"
                                             th:if="${b.numeroAula != null}">
                                            <i class="fa-solid fa-door-open me-1"></i>
                                            <span th:text="'Aula ' + ${b.numeroAula}">Aula</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
        <footer th:replace="~{layout/plantilla :: footer}"></footer>
    </body>
</html>
