<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/plantilla :: head}"></head>
<body>
<div th:replace="~{layout/plantilla :: shell(~{::content})}">
<div th:fragment="content">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div class="d-flex align-items-center gap-3">
            <a th:href="@{/mensajeria}" class="btn btn-sm btn-outline-secondary">
                <i class="fa-solid fa-arrow-left"></i>
            </a>
            <h5 class="fw-bold mb-0" th:text="${conversacion['TITULO']}">Conversación</h5>
        </div>
    </div>

    <div th:if="${mensajeExito}" class="alert alert-success alert-dismissible fade show py-2">
        <i class="fa-solid fa-circle-check me-2"></i><span th:text="${mensajeExito}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${mensajeError}" class="alert alert-danger alert-dismissible fade show py-2">
        <i class="fa-solid fa-circle-xmark me-2"></i><span th:text="${mensajeError}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body p-0">

            <div th:if="${#lists.isEmpty(mensajes)}" class="text-center py-5 text-muted small">
                No hay mensajes en esta conversación.
            </div>

            <div th:each="msg : ${mensajes}" class="px-4 py-3 border-bottom">

                <div class="d-flex justify-content-between align-items-start mb-2">
                    <div class="d-flex align-items-center gap-2">
                        <div class="rounded-circle d-flex align-items-center justify-content-center fw-bold"
                             style="width:36px;height:36px;font-size:13px;"
                             th:classappend="${msg.idEmisor == idUsuario}
                                 ? 'bg-primary text-white' : 'bg-secondary bg-opacity-10 text-secondary'">
                            <span th:text="${#strings.substring(msg.nombreEmisor,0,1)}">A</span>
                        </div>
                        <div>
                            <div class="small fw-semibold" th:text="${msg.nombreEmisor}"></div>
                            <div class="text-muted" style="font-size:11px;">
                                → <span th:text="${msg.nombreRemitente}"></span>
                            </div>
                        </div>
                    </div>
                    <div class="d-flex align-items-center gap-2">
                        <span class="text-muted" style="font-size:11px;" th:text="${msg.fechaEnvio}"></span>
                        <form th:if="${msg.idEmisor == idUsuario}"
                              th:action="@{/mensajeria/mensaje/{id}/eliminar(id=${msg.idMensaje})}"
                              method="post" style="display:inline">
                            <input type="hidden" name="idConversacion" th:value="${idConversacion}">
                            <button type="submit"
                                    class="btn btn-sm btn-outline-danger border-0 py-0 btn-eliminar-msg"
                                    title="Eliminar mensaje">
                                <i class="fa-solid fa-trash-can fa-xs"></i>
                            </button>
                        </form>
                    </div>
                </div>

                <div th:if="${msg.asunto != null and !msg.asunto.isEmpty()}"
                     class="small fw-semibold text-muted mb-1">
                    <i class="fa-solid fa-tag fa-xs me-1"></i>
                    <span th:text="${msg.asunto}"></span>
                </div>

                <div class="p-3 rounded-3 small"
                     th:classappend="${msg.idEmisor == idUsuario} ? 'bg-primary bg-opacity-10' : 'bg-light'"
                     th:text="${msg.contenido}">
                </div>

                <!-- Archivos adjuntos -->
                <div th:if="${msg.archivos != null and not #lists.isEmpty(msg.archivos)}"
                     class="mt-2">
                    <div th:each="arch : ${msg.archivos}"
                         class="mb-2 d-flex align-items-center gap-2">

                        <!-- Imagen inline -->
                        <div th:if="${arch.esImagen}">
                            <img th:src="'/uploads/mensajes/' + ${arch.nombreArchivo}"
                                 class="img-fluid rounded"
                                 style="max-height:260px;max-width:380px;object-fit:contain;cursor:pointer;"
                                 onclick="window.open(this.src,'_blank')"
                                 title="Clic para ver en tamaño completo">
                        </div>

                        <!-- Archivo no imagen -->
                        <a th:unless="${arch.esImagen}"
                           th:href="'/uploads/mensajes/' + ${arch.nombreArchivo}"
                           target="_blank"
                           class="d-inline-flex align-items-center gap-2 border rounded px-3 py-2
                                  bg-white text-decoration-none text-dark"
                           style="font-size:12px;">
                            <i class="fa-solid fa-file-arrow-down text-primary"></i>
                            <span th:text="${arch.nombreLegible}"
                                  class="text-truncate" style="max-width:200px;">archivo</span>
                            <i class="fa-solid fa-download text-muted fa-xs"></i>
                        </a>

                        <!-- Eliminar adjunto -->
                        <form th:action="@{/mensajeria/archivo/{id}/eliminar(id=${arch.idArchivo})}"
                              method="post" style="display:inline">
                            <input type="hidden" name="idConversacion" th:value="${idConversacion}">
                            <button type="submit" class="btn btn-sm p-0 border-0 text-danger btn-eliminar-msg"
                                    title="Eliminar adjunto">
                                <i class="fa-solid fa-xmark"></i>
                            </button>
                        </form>

                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Responder -->
    <div class="card border-0 shadow-sm">
        <div class="card-header bg-white border-bottom py-3">
            <span class="fw-semibold small">
                <i class="fa-solid fa-reply me-2 text-primary"></i>Responder
            </span>
        </div>
        <div class="card-body">
            <form th:action="@{/mensajeria/{id}/responder(id=${idConversacion})}"
                  method="post" enctype="multipart/form-data">
                <input type="hidden" name="idRemitente" th:value="${idOtro}">
                <div class="mb-3">
                    <textarea name="contenido" class="form-control form-control-sm"
                              rows="4" placeholder="Escribe tu respuesta..."
                              maxlength="800" required></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-semibold mb-1">
                        <i class="fa-solid fa-paperclip me-1"></i>Adjuntar archivos (opcional)
                    </label>
                    <input type="file" name="archivos" class="form-control form-control-sm"
                           multiple accept=".pdf,.doc,.docx,.jpg,.jpeg,.png,.xlsx,.xls">
                </div>
                <div class="d-flex justify-content-end">
                    <button type="submit" class="btn btn-primary btn-sm">
                        <i class="fa-solid fa-paper-plane me-1"></i>Enviar respuesta
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal confirmación eliminar -->
    <div class="modal fade" id="modalEliminar" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content border-0 shadow">
                <div class="modal-body text-center py-4 px-4">
                    <div class="rounded-circle bg-danger bg-opacity-10 d-inline-flex
                                align-items-center justify-content-center mb-3"
                         style="width:52px;height:52px;">
                        <i class="fa-solid fa-trash-can text-danger fa-lg"></i>
                    </div>
                    <h6 class="fw-bold mb-1">¿Eliminar este mensaje?</h6>
                    <p class="text-muted small mb-4">Esta acción no se puede deshacer.</p>
                    <div class="d-flex gap-2 justify-content-center">
                        <button type="button" class="btn btn-outline-secondary btn-sm px-4"
                                data-bs-dismiss="modal">Cancelar</button>
                        <button type="button" class="btn btn-danger btn-sm px-4"
                                id="btnConfirmarEliminar">Eliminar</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const modalEl = document.getElementById('modalEliminar');
            const modal   = new bootstrap.Modal(modalEl);
            let formPendiente = null;

            // Delegación de eventos — funciona aunque los botones sean dinámicos
            document.body.addEventListener('click', function(e) {
                const btn = e.target.closest('.btn-eliminar-msg');
                if (btn) {
                    e.preventDefault();
                    e.stopPropagation();
                    formPendiente = btn.closest('form');
                    modal.show();
                }
            });

            document.getElementById('btnConfirmarEliminar').addEventListener('click', function() {
                if (formPendiente) {
                    modal.hide();
                    formPendiente.submit();
                    formPendiente = null;
                }
            });

            // Limpiar al cerrar el modal
            modalEl.addEventListener('hidden.bs.modal', function() {
                formPendiente = null;
            });
        });
    </script>

</div>
</div>
<footer th:replace="~{layout/plantilla :: footer}"></footer>
</body>
</html>
