<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/plantilla :: head}"></head>
<body>
<div th:replace="~{layout/plantilla :: shell(~{::content})}">
    <div th:fragment="content">

        <!-- Alertas flash -->
        <div th:if="${mensajeExito}"
             class="alert alert-success alert-dismissible fade show mb-4" role="alert">
            <i class="fa-solid fa-circle-check me-2"></i>
            <span th:text="${mensajeExito}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${mensajeError}"
             class="alert alert-danger alert-dismissible fade show mb-4" role="alert">
            <i class="fa-solid fa-circle-xmark me-2"></i>
            <span th:text="${mensajeError}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Encabezado -->
        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
            <div>
                <h2 class="fw-bold mb-1">
                    <i class="fa-solid fa-calendar-plus text-primary me-2"></i>Gestión de Eventos
                </h2>
                <p class="text-muted mb-0 small">
                    Total: <span th:text="${#lists.size(eventos)}">0</span> eventos
                </p>
            </div>
            <div class="d-flex gap-2">
                <a th:href="@{/calendario}" class="btn btn-outline-secondary btn-sm">
                    <i class="fa-solid fa-calendar-days me-1"></i> Ver Calendario
                </a>
                <a th:href="@{/eventos/nuevo}" class="btn btn-primary">
                    <i class="fa-solid fa-plus me-1"></i> Nuevo Evento
                </a>
            </div>
        </div>

        <!-- Tabla -->
        <div class="card border-0 shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table align-middle table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Tipo</th>
                                <th>Título</th>
                                <th>Descripción</th>
                                <th>Inicio</th>
                                <th>Fin</th>
                                <th>Estado</th>
                                <th class="text-center">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="evento : ${eventos}">
                                <td>
                                    <span th:switch="${evento.tipoEvento}">
                                        <span th:case="'REUNION'"
                                              class="badge"
                                              style="background:#e3f2fd;color:#1976d2;">
                                            <i class="fa-solid fa-users me-1"></i>Reunión
                                        </span>
                                        <span th:case="'ACTIVIDAD'"
                                              class="badge"
                                              style="background:#e8f5e9;color:#388e3c;">
                                            <i class="fa-solid fa-star me-1"></i>Actividad
                                        </span>
                                        <span th:case="'FERIADO'"
                                              class="badge"
                                              style="background:#ffebee;color:#d32f2f;">
                                            <i class="fa-solid fa-umbrella-beach me-1"></i>Feriado
                                        </span>
                                        <span th:case="'EXAMEN'"
                                              class="badge"
                                              style="background:#f3e5f5;color:#7b1fa2;">
                                            <i class="fa-solid fa-pen-ruler me-1"></i>Examen
                                        </span>
                                        <span th:case="*"
                                              class="badge"
                                              style="background:#fff3e0;color:#f57c00;">
                                            <i class="fa-solid fa-calendar me-1"></i>Otro
                                        </span>
                                    </span>
                                </td>
                                <td class="fw-semibold" th:text="${evento.titulo}"></td>
                                <td class="small text-muted"
                                    th:text="${evento.descripcion != null ? evento.descripcion : '—'}"></td>
                                <td class="small"
                                    th:text="${#temporals.format(evento.fechaInicio, 'dd/MM/yyyy')}"></td>
                                <td class="small text-muted"
                                    th:text="${evento.fechaFin != null ? #temporals.format(evento.fechaFin, 'dd/MM/yyyy') : '—'}"></td>
                                <td>
                                    <span th:if="${evento.idEstadoFk == 1}"
                                          class="badge bg-success-subtle text-success">
                                        <i class="fa-solid fa-circle-check me-1"></i>Activo
                                    </span>
                                    <span th:unless="${evento.idEstadoFk == 1}"
                                          class="badge bg-secondary-subtle text-secondary">
                                        <i class="fa-solid fa-circle-xmark me-1"></i>Inactivo
                                    </span>
                                </td>
                                <td class="text-center">
                                    <div class="d-flex gap-1 justify-content-center">
                                        <a th:href="@{/eventos/editar/{id}(id=${evento.idEvento})}"
                                           class="btn btn-sm btn-outline-primary"
                                           title="Editar">
                                            <i class="fa-regular fa-pen-to-square"></i>
                                        </a>
                                        <button th:if="${evento.idEstadoFk == 1}"
                                                type="button"
                                                class="btn btn-sm btn-outline-warning"
                                                title="Desactivar"
                                                th:onclick="'abrirModalEstado(' + ${evento.idEvento} + ', false)'">
                                            <i class="fa-solid fa-eye-slash"></i>
                                        </button>
                                        <button th:unless="${evento.idEstadoFk == 1}"
                                                type="button"
                                                class="btn btn-sm btn-outline-success"
                                                title="Activar"
                                                th:onclick="'abrirModalEstado(' + ${evento.idEvento} + ', true)'">
                                            <i class="fa-solid fa-eye"></i>
                                        </button>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(eventos)}">
                                <td colspan="7" class="text-center py-5 text-muted">
                                    <i class="fa-solid fa-calendar-xmark fa-3x mb-3 d-block"></i>
                                    <h5>No hay eventos registrados</h5>
                                    <p class="mb-0 small">Crea el primero usando el botón superior.</p>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Modal confirmar cambio de estado -->
        <div class="modal fade" id="modalEstado" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered modal-sm">
                <div class="modal-content">
                    <div class="modal-header py-2">
                        <h6 class="modal-title">
                            <i class="fa-solid fa-circle-question text-warning me-2"></i>
                            Confirmar acción
                        </h6>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body text-center py-3">
                        <p class="mb-0" id="textoModalEstado"></p>
                    </div>
                    <div class="modal-footer py-2 d-flex justify-content-center gap-2">
                        <button type="button" class="btn btn-light btn-sm" data-bs-dismiss="modal">
                            Cancelar
                        </button>
                        <form id="formEstado" method="post">
                            <button type="submit" class="btn btn-sm" id="btnConfirmarEstado">
                                Confirmar
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

<footer th:replace="~{layout/plantilla :: footer}"></footer>

<script>
    function abrirModalEstado(idEvento, activar) {
        const form    = document.getElementById('formEstado');
        const texto   = document.getElementById('textoModalEstado');
        const btnConf = document.getElementById('btnConfirmarEstado');

        if (activar) {
            form.action       = '/eventos/activar/' + idEvento;
            texto.textContent = '¿Desea activar este evento? Aparecerá en el calendario para todos los usuarios.';
            btnConf.className = 'btn btn-sm btn-success';
            btnConf.textContent = 'Activar';
        } else {
            form.action       = '/eventos/desactivar/' + idEvento;
            texto.textContent = '¿Desea desactivar este evento? Dejará de aparecer en el calendario.';
            btnConf.className = 'btn btn-sm btn-warning';
            btnConf.textContent = 'Desactivar';
        }

        new bootstrap.Modal(document.getElementById('modalEstado')).show();
    }
</script>

</body>
</html>
