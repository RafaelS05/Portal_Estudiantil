<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{layout/plantilla :: head}"></head>
    <body>
        <div th:replace="~{layout/plantilla :: shell(~{::content})}">
            <div th:fragment="content">

                <!-- Alertas flash -->
                <div th:if="${mensajeExito}"
                     class="alert alert-success alert-dismissible fade show mb-4" role="alert">
                    <i class="fa-solid fa-circle-check me-2"></i>
                    <span th:text="${mensajeExito}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                <div th:if="${mensajeError}"
                     class="alert alert-danger alert-dismissible fade show mb-4" role="alert">
                    <i class="fa-solid fa-circle-xmark me-2"></i>
                    <span th:text="${mensajeError}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <!-- Encabezado -->
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <h2 class="fw-bold mb-1"
                            th:text="${evento.idEvento != null ? 'Editar Evento' : 'Nuevo Evento'}">
                        </h2>
                        <p class="text-muted mb-0 small">
                            Complete los campos. El evento aparecerá en el calendario al guardarse.
                        </p>
                    </div>
                    <a th:href="@{/eventos}" class="btn btn-outline-secondary btn-sm">
                        <i class="fa-solid fa-arrow-left me-1"></i> Volver
                    </a>
                </div>

                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4">
                        <form th:action="@{/eventos/guardar}"
                              th:object="${evento}"
                              method="post">

                            <input type="hidden" th:field="*{idEvento}">

                            <div class="row g-3">

                                <!-- Tipo de evento -->
                                <div class="col-md-4">
                                    <label class="form-label fw-semibold">
                                        Tipo <span class="text-danger">*</span>
                                    </label>
                                    <select class="form-select" th:field="*{tipoEvento}" required>
                                        <option value="">Seleccione un tipo</option>
                                        <option value="REUNION">Reunión</option>
                                        <option value="ACTIVIDAD">Actividad</option>
                                        <option value="FERIADO">Feriado</option>
                                        <option value="EXAMEN">Examen</option>
                                        <option value="OTRO">Otro</option>
                                    </select>
                                </div>

                                <!-- Fecha de inicio -->
                                <div class="col-md-4">
                                    <label class="form-label fw-semibold">
                                        Fecha de inicio <span class="text-danger">*</span>
                                    </label>
                                    <input type="date"
                                           class="form-control"
                                           th:field="*{fechaInicio}"
                                           required>
                                </div>

                                <!-- Fecha de fin (opcional) -->
                                <div class="col-md-4">
                                    <label class="form-label fw-semibold">
                                        Fecha de fin
                                        <span class="text-muted fw-normal">(opcional)</span>
                                    </label>
                                    <input type="date"
                                           class="form-control"
                                           th:field="*{fechaFin}">
                                    <div class="form-text">
                                        Para eventos de un solo día, deje este campo vacío.
                                    </div>
                                </div>

                                <!-- Título -->
                                <div class="col-12">
                                    <label class="form-label fw-semibold">
                                        Título <span class="text-danger">*</span>
                                    </label>
                                    <input type="text"
                                           class="form-control"
                                           th:field="*{titulo}"
                                           placeholder="Ej: Reunión de padres de familia"
                                           maxlength="120"
                                           required>
                                    <div class="form-text">Máximo 120 caracteres.</div>
                                </div>

                                <!-- Descripción -->
                                <div class="col-12">
                                    <label class="form-label fw-semibold">
                                        Descripción
                                        <span class="text-muted fw-normal">(opcional)</span>
                                    </label>
                                    <textarea class="form-control"
                                              th:field="*{descripcion}"
                                              rows="3"
                                              placeholder="Detalles adicionales del evento..."
                                              maxlength="400"></textarea>
                                    <div class="form-text">Máximo 400 caracteres.</div>
                                </div>

                            </div>

                            <!-- Botones -->
                            <div class="d-flex gap-2 mt-4">
                                <button type="submit" class="btn btn-primary">
                                    <i class="fa-solid fa-floppy-disk me-1"></i>
                                    <span th:text="${evento.idEvento != null ? 'Actualizar' : 'Guardar'}"></span>
                                </button>
                                <a th:href="@{/eventos}" class="btn btn-outline-secondary">
                                    Cancelar
                                </a>
                            </div>

                        </form>
                    </div>
                </div>

            </div>
        </div>
        <footer th:replace="~{layout/plantilla :: footer}"></footer>

        <script>
            document.addEventListener('DOMContentLoaded', function () {
                const inputInicio = document.querySelector('[name="fechaInicio"]');
                const inputFin = document.querySelector('[name="fechaFin"]');
                const form = inputInicio.closest('form');
                const esNuevo = document.querySelector('[name="idEvento"]').value === '';

                function hoyISO() {
                    const hoy = new Date();
                    const y = hoy.getFullYear();
                    const m = String(hoy.getMonth() + 1).padStart(2, '0');
                    const d = String(hoy.getDate()).padStart(2, '0');
                    return `${y}-${m}-${d}`;
                }

                // Solo bloquea fechas pasadas al crear un evento nuevo
                if (esNuevo) {
                    inputInicio.min = hoyISO();
                }

                function actualizarMinFin() {
                    if (inputInicio.value) {
                        inputFin.min = inputInicio.value;
                        if (inputFin.value && inputFin.value < inputInicio.value) {
                            inputFin.value = '';
                        }
                    } else {
                        inputFin.removeAttribute('min');
                    }
                }

                inputInicio.addEventListener('change', actualizarMinFin);
                actualizarMinFin(); // corre también al cargar el formulario de edición

                form.addEventListener('submit', function (e) {
                    if (esNuevo && inputInicio.value && inputInicio.value < hoyISO()) {
                        e.preventDefault();
                        alert('La fecha de inicio no puede ser anterior a hoy.');
                        return;
                    }
                    if (inputFin.value && inputInicio.value && inputFin.value < inputInicio.value) {
                        e.preventDefault();
                        alert('La fecha de fin no puede ser anterior a la fecha de inicio.');
                    }
                });
            });
        </script>

    </body>
</html>
