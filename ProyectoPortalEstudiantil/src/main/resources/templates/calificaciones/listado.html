<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<th:block th:fragment="head">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Portal Estudiantil - Calificaciones</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</th:block>

<th:block th:fragment="contenido">
    <div th:replace="~{layout/plantilla :: shell(~{::section#contenido})}">
        <section id="contenido">
            <div class="mb-3 d-flex justify-content-end">
                <a th:href="@{/calificaciones/nuevo}" class="btn btn-primary btn-sm">
                    <i class="fa-solid fa-plus me-1"></i>Ingresar Nota
                </a>
            </div>

            <div class="card tbl-card">
                <div class="table-responsive">
                    <table class="table mb-0">
                        <thead>
                            <tr>
                                <th>Estudiante</th>
                                <th>Evaluación</th>
                                <th>Nota</th>
                                <th class="text-center">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="c : ${calificaciones}">
                                <td class="fw-semibold" th:text="${c.estudiante}">Nombre Estudiante</td>
                                <td th:text="${c.evaluacion}">Tipo Evaluación</td>
                                <td>
                                    <span class="badge bg-primary-subtle text-primary" th:text="${c.nota}">0.0</span>
                                </td>
                                <td>
                                    <div class="d-flex gap-1 justify-content-center">
                                        <button type="button" 
                                                class="btn btn-sm btn-outline-danger" 
                                                data-bs-toggle="modal" 
                                                th:data-bs-target="'#deleteModal' + ${c.id}">
                                            <i class="fa-solid fa-trash"></i>
                                        </button>
                                    </div>

                                    <div class="modal fade" th:id="'deleteModal' + ${c.id}" tabindex="-1" aria-hidden="true">
                                        <div class="modal-dialog modal-dialog-centered">
                                            <div class="modal-content">
                                                <div class="modal-header">
                                                    <h5 class="modal-title">Confirmar Eliminación</h5>
                                                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                                                </div>
                                                <div class="modal-body text-start">
                                                    ¿Estás seguro de que deseas eliminar la calificación de <strong th:text="${c.estudiante}"></strong>?
                                                </div>
                                                <div class="modal-footer">
                                                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                                                    <a th:href="@{/calificaciones/eliminar/{id}(id=${c.id})}" class="btn btn-danger">Eliminar</a>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(calificaciones)}">
                                <td colspan="4" class="text-center text-muted py-4">No hay calificaciones registradas.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div class="card-footer">
                    Total de registros: <strong th:text="${#lists.size(calificaciones)}">0</strong>
                </div>
            </div>
        </section>
    </div>
</th:block>
</html>
