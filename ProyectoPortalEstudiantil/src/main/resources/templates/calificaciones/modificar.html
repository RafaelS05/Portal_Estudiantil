<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <th:block th:fragment="head">
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>Portal Estudiantil - Calificación</title>

        <link rel="icon" type="image/x-icon" th:href="@{/img/Escuela_Neftali.png}">

        <link rel="stylesheet"
              href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

        <link rel="stylesheet" th:href="@{/css/layout.css}">
        <link rel="stylesheet" th:href="@{/css/evaluaciones.css}">

        <link rel="stylesheet"
              href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    </th:block>

    <body>

    <th:block th:fragment="contenido">

        <div th:replace="~{layout/plantilla :: shell(~{::section#formulario})}">

            <section id="formulario">

                <div class="page-header">
                    <h4 class="page-title fw-bold">Calificación</h4>

                    <a th:href="@{/calificaciones}"
                       class="btn btn-light btn-sm btn-back">
                        <i class="fa-solid fa-arrow-left"></i>
                        Volver
                    </a>
                </div>

                <div class="card form-card">
                    <div class="card-body">

                        <form th:action="@{/calificaciones/guardar}"
                              th:object="${calificacion}"
                              method="POST">

                            <input type="hidden" th:field="*{idCalificaciones}" />

                            <div class="row g-3">

                                <div class="col-md-4">
                                    <label class="form-label">Nota Obtenida</label>
                                    <input type="number"
                                           step="0.01"
                                           min="0"
                                           max="100"
                                           placeholder="0.00"
                                           class="form-control form-control-custom"
                                           th:field="*{calificacion}"
                                           required>
                                </div>

                                <div class="col-md-8">
                                    <label class="form-label">Sección</label>

                                    <select class="form-select form-control-custom"
                                            id="selectSeccion"
                                            required>

                                        <option value="" selected disabled>
                                            Seleccione una sección...
                                        </option>

                                        <option th:each="s : ${secciones}"
                                                th:value="${s.id}"
                                                th:text="${s.nombre}">
                                        </option>

                                    </select>
                                </div>

                                <div class="col-md-8">
                                    <label class="form-label">Estudiante</label>

                                    <select class="form-select form-control-custom"
                                            name="matricula"
                                            id="selectMatricula"
                                            required
                                            disabled>

                                        <option value="" selected disabled>
                                            Primero seleccione una sección...
                                        </option>

                                    </select>
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label">Tipo de Evaluación</label>

                                    <select class="form-select form-control-custom"
                                            name="evaluacion"
                                            required>

                                        <option value="" selected disabled>
                                            Seleccione el tipo...
                                        </option>

                                        <option th:each="e : ${evaluaciones}"
                                                th:value="${e.idEvaluacion}"
                                                th:text="${e.tipo}">
                                        </option>

                                    </select>
                                </div>

                            </div>

                            <div class="form-actions mt-4">

                                <button type="submit"
                                        class="btn btn-primary btn-save">
                                    <i class="fa-solid fa-floppy-disk me-1"></i>
                                    Guardar
                                </button>

                                <a th:href="@{/calificaciones}"
                                   class="btn btn-outline-secondary btn-cancel">
                                    Cancelar
                                </a>

                            </div>

                        </form>

                    </div>
                </div>

            </section>

        </div>

    </th:block>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/calificaciones.js}"></script>

</body>
</html>
