<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<th:block th:fragment="head">
    <meta charset="UTF-8"/>
    <title>Portal Estudiantil - Formulario</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</th:block>

<th:block th:fragment="contenido">
    <div th:replace="~{layout/plantilla :: shell(~{::section#contenido})}">
        <section id="contenido">

            <div class="mb-4">
                <h2 class="fw-bold mb-1">Registro de Calificación</h2>
                <p class="text-muted mb-0 small">Ingrese los datos para la nueva nota</p>
            </div>

            <div class="card shadow-sm border-0" style="max-width: 600px;">
                <div class="card-body p-4">
                    
                    <form th:action="@{/calificaciones/guardar}" th:object="${calificacion}" method="POST">
                        
                        <input type="hidden" th:field="*{idCalificaciones}" />

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Nota Obtenida</label>
                            <input type="number" step="0.01" class="form-control" th:field="*{calificacion}" 
                                   placeholder="0.00" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">ID Matrícula</label>
                            <input type="number" class="form-control" th:field="*{matricula.idMatricula}" 
                                   placeholder="ID del registro de matrícula" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">ID Evaluación</label>
                            <input type="number" class="form-control" th:field="*{evaluacion.idEvaluacion}" 
                                   placeholder="ID de la evaluación" required>
                        </div>

                        <div class="d-flex gap-2 pt-3">
                            <button type="submit" class="btn btn-primary px-4">
                                <i class="fa-solid fa-floppy-disk me-2"></i>Guardar
                            </button>
                            <a th:href="@{/calificaciones}" class="btn btn-outline-secondary">
                                Cancelar
                            </a>
                        </div>
                    </form>
                    
                </div>
            </div>

        </section>
    </div>
</th:block>
</html>
