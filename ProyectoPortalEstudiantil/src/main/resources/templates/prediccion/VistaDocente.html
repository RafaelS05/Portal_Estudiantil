<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/plantilla :: head}"></head>
<body>
<div th:replace="~{layout/plantilla :: shell(~{::content})}">
<div th:fragment="content">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="fw-bold mb-0">
                <i class="fa-solid fa-chart-line text-primary me-2"></i>Análisis Predictivo
            </h4>
        </div>
    </div>

    <!-- Filtro período -->
    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body py-3">
            <form th:action="@{/prediccion/docente}" method="get" class="row g-2 align-items-end">
                <div class="col-12 col-md-4">
                    <label class="form-label small fw-semibold mb-1">Período académico</label>
                    <select name="idPeriodo" class="form-select form-select-sm" onchange="this.form.submit()">
                        <option value="">— Seleccione un período —</option>
                        <option th:each="p : ${periodos}"
                                th:value="${p.idPeriodo}"
                                th:text="${p.nombre}"
                                th:selected="${p.idPeriodo == idPeriodoSel}"></option>
                    </select>
                </div>
            </form>
        </div>
    </div>

    <!-- Tarjetas resumen -->
    <div class="row g-3 mb-4">
        <div class="col-6 col-md-3">
            <div class="card border-0 shadow-sm border-start border-danger border-3 h-100">
                <div class="card-body d-flex align-items-center gap-3">
                    <i class="fa-solid fa-triangle-exclamation fa-lg text-danger"></i>
                    <div>
                        <div class="small text-muted">Riesgo Alto</div>
                        <div class="fs-4 fw-bold text-danger" th:text="${totalAlto}">0</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card border-0 shadow-sm border-start border-warning border-3 h-100">
                <div class="card-body d-flex align-items-center gap-3">
                    <i class="fa-solid fa-circle-exclamation fa-lg text-warning"></i>
                    <div>
                        <div class="small text-muted">Riesgo Medio</div>
                        <div class="fs-4 fw-bold text-warning" th:text="${totalMedio}">0</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card border-0 shadow-sm border-start border-success border-3 h-100">
                <div class="card-body d-flex align-items-center gap-3">
                    <i class="fa-solid fa-circle-check fa-lg text-success"></i>
                    <div>
                        <div class="small text-muted">Riesgo Bajo</div>
                        <div class="fs-4 fw-bold text-success" th:text="${totalBajo}">0</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-6 col-md-3">
            <div class="card border-0 shadow-sm border-start border-primary border-3 h-100">
                <div class="card-body d-flex align-items-center gap-3">
                    <i class="fa-solid fa-users fa-lg text-primary"></i>
                    <div>
                        <div class="small text-muted">Total</div>
                        <div class="fs-4 fw-bold text-primary"
                             th:text="${totalAlto + totalMedio + totalBajo}">0</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Tabla -->
    <div class="card border-0 shadow-sm">
        <div class="card-header bg-white border-bottom py-3">
            <span class="fw-semibold">
                <i class="fa-solid fa-table me-2 text-primary"></i>Predicción por Estudiante
            </span>
        </div>
        <div class="card-body p-0">
            <div th:if="${#lists.isEmpty(estudiantes)}" class="text-center py-5 text-muted">
                <i class="fa-solid fa-folder-open fa-2x mb-2 d-block opacity-25"></i>
                Selecciona un período para ver la predicción.
            </div>
            <div th:if="${not #lists.isEmpty(estudiantes)}" class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th class="ps-3">#</th>
                            <th>Estudiante</th>
                            <th>Sección</th>
                            <th class="text-center">Promedio</th>
                            <th class="text-center">Nivel de Riesgo</th>
                            <th>Encargado</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="est, idx : ${estudiantes}"
                            th:classappend="${est.nivelRiesgo == 'ALTO'} ? 'table-danger' :
                                            (${est.nivelRiesgo == 'MEDIO'} ? 'table-warning' : '')">
                            <td class="ps-3 text-muted small" th:text="${idx.count}"></td>
                            <td>
                                <div class="fw-semibold small" th:text="${est.nombreEstudiante}"></div>
                            </td>
                            <td>
                                <span class="badge bg-secondary bg-opacity-10 text-secondary fw-normal"
                                      th:text="${est.seccion}"></span>
                            </td>
                            <td class="text-center fw-bold"
                                th:classappend="${est.promedio < 65} ? 'text-danger' :
                                                (${est.promedio < 75} ? 'text-warning' : 'text-success')"
                                th:text="${est.promedio > 0} ? ${#numbers.formatDecimal(est.promedio,1,2)} : '—'">
                            </td>
                            <td class="text-center">
                                <span th:switch="${est.nivelRiesgo}">
                                    <span th:case="'ALTO'"  class="badge bg-danger">⚠ ALTO</span>
                                    <span th:case="'MEDIO'" class="badge bg-warning text-dark">⚡ MEDIO</span>
                                    <span th:case="'BAJO'"  class="badge bg-success">✅ BAJO</span>
                                    <span th:case="*"       class="badge bg-secondary">Sin datos</span>
                                </span>
                            </td>
                            <td class="small" th:text="${est.nombreEncargado}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>
</div>
<footer th:replace="~{layout/plantilla :: footer}"></footer>
</body>
</html>
