<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/plantilla :: head}"></head>
<body>
    <div th:replace="~{layout/plantilla :: shell(~{::content})}">
        <div th:fragment="content">

            <div class="d-flex align-items-center gap-3 mb-4">
                <div>
                    <h2 class="fw-bold mb-1">
                        <i class="fa-solid fa-clipboard-check text-primary me-2"></i>Historial de Asistencia
                    </h2>
                    <p class="text-muted mb-0">Consulta la asistencia de tu(s) hijo(s)</p>
                </div>
            </div>

            <!-- Selector de hijo (solo si tiene más de uno) -->
            <div class="card mb-4" th:if="${#lists.size(hijos) > 1}">
                <div class="card-body py-3">
                    <form th:action="@{/asistencias/historial}" method="get" class="row g-2 align-items-end">
                        <div class="col-md-6">
                            <label class="form-label small fw-semibold">Estudiante</label>
                            <select name="idEstudiante" class="form-select" onchange="this.form.submit()">
                                <option value="">Todos mis hijos</option>
                                <option th:each="h : ${hijos}"
                                        th:value="${h.idUsuario}"
                                        th:text="${h.nombreCompleto}"
                                        th:selected="${idEstudiante != null and idEstudiante == h.idUsuario}">
                                </option>
                            </select>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Tabla de historial -->
            <div class="card">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table align-middle table-hover mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>Fecha</th>
                                    <th>Estudiante</th>
                                    <th>Materia</th>
                                    <th>Sección</th>
                                    <th>Estado</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="h : ${historial}">
                                    <td class="small text-muted" th:text="${h.fechaAsistencia}"></td>
                                    <td class="fw-semibold" th:text="${h.nombreEstudiante}"></td>
                                    <td th:text="${h.nombreMateria}"></td>
                                    <td>
                                        <span class="badge bg-primary bg-opacity-10 text-primary fw-semibold"
                                              th:text="${h.numeroSeccion}"></span>
                                    </td>
                                    <td>
                                        <span th:if="${h.idEstadoFk == 7}"
                                              class="badge bg-success-subtle text-success">
                                            <i class="fa-solid fa-check me-1"></i>Presente
                                        </span>
                                        <span th:if="${h.idEstadoFk == 8}"
                                              class="badge bg-danger-subtle text-danger">
                                            <i class="fa-solid fa-xmark me-1"></i>Ausente
                                        </span>
                                        <span th:if="${h.idEstadoFk == 9}"
                                              class="badge bg-warning-subtle text-warning">
                                            <i class="fa-solid fa-clock me-1"></i>Tarde
                                        </span>
                                        <span th:if="${h.idEstadoFk == 10}"
                                              class="badge bg-info-subtle text-info">
                                            <i class="fa-solid fa-file-circle-check me-1"></i>Justificado
                                        </span>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(historial)}">
                                    <td colspan="5" class="text-center py-5 text-muted">
                                        <i class="fa-solid fa-clipboard-list fa-3x mb-3 d-block"></i>
                                        <h5>No hay registros de asistencia</h5>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>
    <footer th:replace="~{layout/plantilla :: footer}"></footer>
</body>
</html>
